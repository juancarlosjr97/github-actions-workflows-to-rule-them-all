---
name: Security
description: |
  This workflow scans Rust dependencies for known vulnerabilities using cargo-audit.

on:
  workflow_call:
    secrets:
      GITHUB_TOKEN:
        description: "GitHub token used by rustsec/audit-check"
        required: true

jobs:
  cargo-audit:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run Cargo Audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
